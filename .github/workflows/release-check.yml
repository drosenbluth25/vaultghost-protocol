name: VaultGhost v0.1.1 Release Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  release-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Validate schemas
        run: |
          python tools/validate_all_schemas.py --root .

      - name: Run full release checks
        run: |
          python tools/run_all_checks_local_v0_1_1.py --root .

      - name: Upload check reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vaultghost-v0.1.1-check-reports
          path: |
            reports/*.json
          if-no-files-found: ignore
