  evidence_bindings:
  - claim_index: 1
    evidence_objects:
    - evidence_id: E-006-A
      source_type: process_server_affidavit
      source_tier: 2
      relation_to_claim: direct_support
      provenance_status: official
      access_status: available
      supports_exact_claim: true
      bucket_ceiling_override: may_verify_narrow_event_fact_only
      limitations: []
  - claim_index: 2
    evidence_objects:
    - evidence_id: E-006-B
      source_type: process_server_affidavit
      source_tier: 2
      relation_to_claim: indirect_support
      provenance_status: official
      access_status: available
      supports_exact_claim: false
      limitations:
      - Affidavit may support event fact but does not determine legal sufficiency.
  expected_split_rule_path:
  - document_fact_legal_conclusion_split
  - emit_atomic_claims
  expected_claim_records:
  - claim_index: 1
    claim_type: event_fact
    current_bucket: VERIFIED
    support_strength: strong
    legal_conclusion_blocked: false
  - claim_index: 2
    claim_type: legal_conclusion
    current_bucket: INFERRED
    support_strength: weak
    legal_conclusion_blocked: true
  must_not_packet:
  - legal_sufficiency_verified
  - merge_service_attempt_with_legal_sufficiency
- fixture_id: VG-E2E-FIXTURE-007
  name: Missing attachment reference plus halted proceeding claim
  dominant_invariant: missing_sources_do_not_inherit_verification
  raw_statement: The email references an attached order, and the order halted the foreclosure proceeding.
  evidence_bindings:
  - claim_index: 1
    evidence_objects:
    - evidence_id: E-007-A
      source_type: attorney_email
      source_tier: 2
      relation_to_claim: direct_support
      provenance_status: user_supplied
      access_status: available
      supports_exact_claim: true
      limitations:
      - Email references an attachment, but attachment is missing.
  - claim_index: 2
    evidence_objects:
    - evidence_id: E-007-B
      source_type: attorney_email
      source_tier: 2
      relation_to_claim: context_only
      provenance_status: user_supplied
      access_status: available
      supports_exact_claim: false
      limitations:
      - Email references an attachment, but attachment is missing.
      - Email body does not directly quote or reproduce the order.
  expected_split_rule_path:
  - document_fact_legal_conclusion_split
  - emit_atomic_claims
  expected_claim_records:
  - claim_index: 1
    claim_type: document_fact
    current_bucket: QUARANTINED
    support_strength: weak
    legal_conclusion_blocked: true
  - claim_index: 2
    claim_type: procedural_status
    current_bucket: QUARANTINED
    support_strength: weak
    legal_conclusion_blocked: true
  must_not_packet:
  - inherit_verification_from_missing_attachment
  - halted_proceeding_verified
- fixture_id: VG-E2E-FIXTURE-008
  name: Already atomic filing date claim
  dominant_invariant: single_atomic_statement_flows_through_pipeline
  raw_statement: A petition was filed on February 25, 2026.
  evidence_bindings:
  - claim_index: 1
    evidence_objects:
    - evidence_id: E-008-A
      source_type: docket_entry
      source_tier: 1
      relation_to_claim: direct_support
      provenance_status: official
      access_status: available
      supports_exact_claim: true
      limitations: []
  expected_split_rule_path:
