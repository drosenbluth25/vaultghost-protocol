suite_id: VG-CLAIM-SPLIT-FIXTURES-v0.1
protocol: VaultGhost Claim-Splitting Preprocessor
version: '0.1'
artifact_type: claim_splitting_regression_fixture_suite
status: draft
engine_boundary: Fixtures test decomposition only. Bucket assignment is intentionally
  out of scope.
default_atomic_starting_bucket: QUARANTINED
fixture_schema_required_fields:
- fixture_id
- name
- dominant_rule
- input_statement
- expected_split_count
- expected_atomic_claims
- expected_rule_path
- must_not
fixtures:
- fixture_id: VG-SPLIT-FIXTURE-001
  name: Court order plus legal defect conclusion
  dominant_rule: VG-SPLIT-001
  input_statement: The court issued an order on March 1, 2026, and the foreclosure
    is legally defective.
  expected_split_count: 2
  expected_atomic_claims:
  - atomic_claim_id: VG-SPLIT-FIXTURE-001-C1
    claim_text: The court issued an order on March 1, 2026.
    claim_type: document_fact
    asserted_as: fact
    split_basis: document_fact_component
    flags:
    - bucket_eval_required
    starting_bucket: QUARANTINED
  - atomic_claim_id: VG-SPLIT-FIXTURE-001-C2
    claim_text: The foreclosure is legally defective.
    claim_type: legal_conclusion
    asserted_as: legal_conclusion
    split_basis: legal_conclusion_component
    flags:
    - legal_conclusion_candidate
    - bucket_eval_required
    starting_bucket: QUARANTINED
  expected_rule_path:
  - document_fact_legal_conclusion_split
  - emit_atomic_claims
  must_not:
  - merge_document_fact_with_legal_conclusion
  - assign_bucket
