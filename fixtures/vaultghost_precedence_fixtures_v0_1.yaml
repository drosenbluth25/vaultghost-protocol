    source_type: court_order
    source_tier: 1
    relation_to_claim: direct_support
    provenance_status: official
    access_status: available
    supports_exact_claim: true
    limitations:
    - Order appears to support the procedural status.
  - evidence_id: E-002
    source_type: transcript
    source_tier: 1
    relation_to_claim: contradiction
    provenance_status: official
    access_status: available
    supports_exact_claim: false
    limitations:
    - Transcript states only an adjournment was discussed, not a halt.
  expected_result:
    expected_bucket: CONTRADICTED
    support_strength: conflicted
    legal_conclusion_blocked: false
    expected_limitations:
    - Equal-tier authoritative evidence conflicts on the procedural status.
    expected_transition_reason: Equal authoritative contradiction prevents verification.
  expected_rule_path:
  - material_contradiction_check
  - equal_authoritative_conflict_check
  - contradicted_assignment
  must_not_return:
