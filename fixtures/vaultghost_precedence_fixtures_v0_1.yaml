- fixture_id: VG-PRECEDENCE-004
  name: OCR-damaged court order plus legal inference
  collision_type: primary_caveat_vs_legal_conclusion
  starting_bucket: QUARANTINED
  claim:
    claim_text: The OCR-damaged order proves the foreclosure is legally defective.
    claim_type: legal_conclusion
    asserted_as: legal_conclusion
  evidence_objects:
  - evidence_id: E-001
    source_type: court_order
    source_tier: 1
    relation_to_claim: indirect_support
    provenance_status: official
    access_status: partial
    supports_exact_claim: false
    limitations:
    - OCR damage affects readability.
    - Order does not directly state legal defectiveness.
  expected_result:
    expected_bucket: INFERRED
    support_strength: weak
    legal_conclusion_blocked: true
    expected_limitations:
    - Court order may support a document fact, but the legal conclusion is only indirectly
