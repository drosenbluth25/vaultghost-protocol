    requested_bucket: VERIFIED
    reviewer_note: Human wants this treated as verified for memo speed.
  claim:
    claim_text: The court formally stayed the foreclosure on March 1, 2026.
    claim_type: procedural_status
    asserted_as: fact
  evidence_objects:
  - evidence_id: E-001
    source_type: user_statement
    source_tier: 4
    relation_to_claim: direct_support
    provenance_status: user_supplied
    access_status: available
    supports_exact_claim: true
    limitations:
    - No court order, docket entry, transcript, or attorney confirmation supplied.
  expected_result:
    expected_bucket: USER_ORIGINATED
    support_strength: tracked_not_verified
    legal_conclusion_blocked: true
    expected_limitations:
    - Manual override cannot mark VERIFIED without reliable direct evidence.
    expected_transition_reason: Manual override is rejected; user statement remains
