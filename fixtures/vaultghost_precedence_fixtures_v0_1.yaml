suite_id: VG-PRECEDENCE-FIXTURES-v0.1
version: '0.1'
artifact_type: precedence_regression_fixture_suite
status: draft
created_at: '2026-06-02T10:23:10.256979Z'
purpose: Stress-test VaultGhost claim_bucket rule collisions after atomic and integration
  fixtures pass.
design_mode: synthetic_first_counsel_safe
default_bucket: QUARANTINED
fixture_schema_required_fields:
- fixture_id
- name
- starting_bucket
- claim
- evidence_objects
- expected_result
- expected_rule_path
- must_not_return
precedence_order:
- manual_override_validation_check
- fabricated_or_invalid_source_block
- missing_source_block
- material_contradiction_check
- explicit_motive_intent_block
- legal_conclusion_block
- user_corroboration_check
- direct_support_check
- indirect_support_check
- fallback_quarantine
engine_assumptions:
  fixtures_are_atomic_claims: true
  claim_splitting_out_of_scope: true
  manual_override_cannot_bypass_verification_standard: true
  contradiction_outranks_positive_support: true
  missing_source_cannot_inherit_verification: true
  explicit_motive_intent_outranks_generic_legal_substance_detection: true
  legal_conclusion_cannot_inherit_document_fact_verification: true
  motive_claim_cannot_inherit_event_or_filing_verification: true
fixtures:
- fixture_id: VG-PRECEDENCE-001
  name: Primary support plus stronger contradiction
  collision_type: positive_support_vs_contradiction
  starting_bucket: QUARANTINED
  claim:
    claim_text: The hearing occurred on March 12, 2026.
    claim_type: date_fact
    asserted_as: fact
  evidence_objects:
  - evidence_id: E-001
    source_type: attorney_email
    source_tier: 2
    relation_to_claim: direct_support
    provenance_status: user_supplied
    access_status: available
    supports_exact_claim: true
    limitations:
    - Attorney email states March 12, 2026.
  - evidence_id: E-002
    source_type: docket_entry
    source_tier: 1
    relation_to_claim: contradiction
    provenance_status: official
    access_status: available
    supports_exact_claim: false
    limitations:
    - Official docket lists March 13, 2026 instead.
  expected_result:
    expected_bucket: CONTRADICTED
    support_strength: conflicted
    legal_conclusion_blocked: false
    expected_limitations:
    - Direct support exists, but reliable stronger evidence materially conflicts with
      the claim.
    expected_transition_reason: Material contradiction outranks positive support.
  expected_rule_path:
  - material_contradiction_check
  - contradiction_outranks_positive_support
  - contradicted_assignment
  must_not_return:
  - VERIFIED
  - PROVISIONALLY_VERIFIED
