  evidence_objects:
  - evidence_id: E-001
    source_type: filed_pleading
    source_tier: 1
    relation_to_claim: direct_support
    provenance_status: official
    access_status: partial
    supports_exact_claim: true
    limitations:
    - Scanned document contains OCR uncertainty.
    - Name field is partially degraded in extracted text.
  expected_result:
