    relation_to_claim: context_only
    provenance_status: AI_generated
    access_status: available
    supports_exact_claim: false
    limitations:
    - Derived from prior-session memory or model reconstruction.
  expected_result:
    expected_bucket: QUARANTINED
    support_strength: weak
    legal_conclusion_blocked: false
    expected_limitations:
    - AI memory cannot independently verify the claim.
    expected_transition_reason: Model-generated memory is not evidence.
  expected_rule_path:
  - ai_memory_cannot_verify_check
