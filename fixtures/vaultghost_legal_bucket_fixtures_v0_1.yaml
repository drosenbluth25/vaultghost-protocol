  dominant_rule: tier_2_event_fact_verification_exception
  starting_bucket: QUARANTINED
  claim:
    claim_text: The process server attempted service at the residence on April 5, 2026.
    claim_type: event_fact
    asserted_as: fact
  evidence_objects:
  - evidence_id: E-001
    source_type: process_server_affidavit
    source_tier: 2
    relation_to_claim: direct_support
    provenance_status: official
    access_status: available
    supports_exact_claim: true
    limitations: []
    bucket_ceiling_override: may_verify_narrow_event_fact_only
    does_not_verify:
